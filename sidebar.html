<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #eef3ed;
      --border: #d1d5db;
      --surface: #ffffff;
      --text: #2d362b;
      --text-muted: #6b7a68;
      --accent: #16a34a;
      --accent-hover: #15803d;
      --success: #16a34a;
      --error: #dc2626;
      --dev-bg: #f1f1f1;
      --dev-text: #8a9987;
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 13px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .logo {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .close-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .close-btn:hover {
      background: rgba(0, 0, 0, 0.06);
      color: var(--text);
    }

    /* Main content area */
    .content {
      flex: 1;
      min-height: 0;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-save {
      background: var(--accent);
      color: white;
    }

    .btn-save:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-cancel {
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-cancel:hover:not(:disabled) {
      background: rgba(0, 0, 0, 0.04);
      color: var(--text);
    }

    /* Reload button inside error notifications */
    .btn-reload {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-reload:hover {
      background: var(--bg);
      color: var(--text);
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge.editing {
      background: rgba(22, 163, 74, 0.08);
      color: var(--accent);
    }

    .status-badge.saving {
      background: rgba(22, 163, 74, 0.08);
      color: var(--accent);
    }

    .status-badge.syncing {
      background: #fffbeb;
      color: #b45309;
    }

    .status-badge.error {
      background: rgba(220, 38, 38, 0.06);
      color: var(--error);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-badge.editing .status-dot,
    .status-badge.saving .status-dot,
    .status-badge.syncing .status-dot {
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Dev panel */
    .dev-panel {
      height: 50vh;
      min-height: 0;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      background: var(--dev-bg);
      display: flex;
      flex-direction: column;
      transition: height 0.25s ease;
    }

    .dev-panel.collapsed {
      height: 33px;
      overflow: hidden;
    }

    .dev-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      flex-shrink: 0;
    }

    .dev-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--dev-text);
    }

    .dev-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dev-text);
      padding: 2px;
      display: flex;
      align-items: center;
      transition: opacity 0.15s;
      line-height: 1;
    }

    .dev-toggle:hover {
      opacity: 0.7;
    }

    .dev-toggle svg {
      transition: transform 0.25s ease;
    }

    .dev-panel.collapsed .dev-toggle svg {
      transform: rotate(180deg);
    }

    .dev-body {
      flex: 1;
      min-height: 0;
      padding: 0 16px 10px;
      display: flex;
      flex-direction: column;
    }

    .dev-log {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      line-height: 1.7;
      color: var(--dev-text);
      flex: 1;
      overflow-y: auto;
    }

    .dev-log .entry {
      padding: 2px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .dev-log .label {
      color: #a8a29e;
    }

    .dev-log .value {
      color: var(--text);
    }

    .dev-log .value.success {
      color: var(--success);
    }

    .dev-log .value.error {
      color: var(--error);
    }

    /* Notification toast */
    .notification {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      animation: slideIn 0.2s ease;
    }

    .notification.success {
      background: rgba(22, 163, 74, 0.08);
      color: #166534;
      border: 1px solid rgba(22, 163, 74, 0.15);
    }

    .notification.error {
      background: rgba(220, 38, 38, 0.06);
      color: #991b1b;
      border: 1px solid rgba(220, 38, 38, 0.12);
    }

    .notification.info {
      background: rgba(0, 0, 0, 0.03);
      color: var(--text-muted);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hidden utility */
    .hidden {
      display: none !important;
    }

    /* File list */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-top: 4px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text-muted);
      border-radius: 4px;
      transition: background 0.15s;
    }

    .file-item.active {
      color: var(--text);
    }

    .file-item .file-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .file-item.active .file-dot {
      background: var(--success);
    }

    .file-item:not(.active) .file-dot {
      background: var(--border);
    }

    .file-item .file-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo">blip</div>
    <button class="close-btn" id="closeBtn" title="Close sidebar">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round">
        <line x1="4" y1="4" x2="12" y2="12" />
        <line x1="12" y1="4" x2="4" y2="12" />
      </svg>
    </button>
  </div>

  <div class="content">
    <!-- Default state -->
    <div id="defaultState">
      <button class="btn btn-primary" id="editBtn">Edit</button>
    </div>

    <!-- Editing state -->
    <div id="editingState" class="hidden">
      <div class="status-badge editing">
        <span class="status-dot"></span>
        Editing
      </div>
      <button class="btn btn-save" id="saveBtn">Save</button>
      <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
    </div>

    <!-- Saving state -->
    <div id="savingState" class="hidden">
      <div class="status-badge saving">
        <span class="status-dot"></span>
        Saving...
      </div>
    </div>

    <!-- File list -->
    <div id="fileList" class="file-list"></div>

    <!-- Notifications area -->
    <div id="notifications"></div>
  </div>

  <!-- Dev panel -->
  <div class="dev-panel" id="devPanel">
    <div class="dev-header">
      <span class="dev-label">Dev</span>
      <button class="dev-toggle" id="devToggle" title="Collapse/expand">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="2,4 6,8 10,4" />
        </svg>
      </button>
    </div>
    <div class="dev-body">
      <div class="dev-log" id="devLog"></div>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>

</html>
