<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>

<body>

  <!-- COLLAPSED VIEW -->
  <div id="collapsedView" class="collapsed-view">
    <div id="blipTab" class="blip-tab tab-state-default">
      <span class="tab-name">blip</span>
      <span class="tab-control tab-show-default" data-action="startEdit">edit</span>
      <span class="tab-control tab-show-editing">
        <span class="editing-label" data-action="cancel">cancel</span>
        <span class="label-save" data-action="save">save<span class="tab-dots-slow"></span></span>
      </span>
      <span class="tab-control tab-show-saving">saving<span class="tab-dots"></span></span>
      <span class="tab-control tab-show-saved">saved!</span>
      <span class="tab-control tab-show-error" data-action="startEdit">retry</span>
      <span class="tab-expand" data-action="expandSidebar" title="Open sidebar">››</span>
    </div>
  </div>

  <!-- EXPANDED VIEW -->
  <div id="expandedView" class="expanded-view hidden">
    <div class="header">
      <div class="logo">blip<span class="url-part">cms.com</span></div>
      <button class="close-btn" id="closeBtn" title="Close sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round">
          <line x1="4" y1="4" x2="12" y2="12" />
          <line x1="12" y1="4" x2="4" y2="12" />
        </svg>
      </button>
    </div>

    <div class="content">
      <!-- Default state: just the Edit button -->
      <div id="defaultState">
        <button class="btn btn-primary" id="editBtn">Edit</button>
      </div>

      <!-- Editing state: status + save/cancel + save-to option -->
      <div id="editingState" class="hidden">
        <div class="editing-controls">
          <div class="status-badge editing">
            <span class="status-dot"></span>
            Editing
          </div>
          <button class="btn btn-save" id="saveBtn">Save</button>
          <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
        </div>

        <!-- Save-to-repo checkbox (shown when site is connected) -->
        <div id="saveToRepo" class="save-to-repo hidden">
          <label class="save-to-label">
            <input type="checkbox" id="saveToCheckbox" checked>
            <span>Save to <strong id="saveToSiteName"></strong></span>
          </label>
        </div>

        <!-- CTA message (shown when site is NOT connected) -->
        <div id="saveToPrompt" class="save-to-prompt hidden">
          <p>Want to save your edits directly to <strong id="promptSiteName"></strong>?</p>
        </div>
      </div>

      <!-- Saving state -->
      <div id="savingState" class="hidden">
        <div class="status-badge saving">
          <span class="status-dot"></span>
          Saving...
        </div>
      </div>

      <!-- Notifications -->
      <div id="notifications"></div>

      <!-- Your edits: diff accumulator (always visible) -->
      <div id="siteEdits" class="site-edits">
        <div class="site-edits-header">
          <span class="site-edits-label">your edits</span>
          <span class="material-symbols-outlined site-edits-copy" id="copyEditsBtn"
            title="Copy to clipboard">content_copy</span>
        </div>
        <textarea id="editsTextarea" readonly placeholder="Your edits will appear here as you save changes."></textarea>
      </div>

      <!-- File list: sites and their files -->
      <div id="fileList" class="file-list"></div>
    </div>

    <!-- Config panel -->
    <div class="config-panel collapsed" id="configPanel">
      <div class="config-header">
        <span class="config-label">Manage sites</span>
        <button class="config-toggle" id="configToggle" title="Collapse/expand">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,4 6,8 10,4" />
          </svg>
        </button>
      </div>
      <div class="config-body" id="configBody">
        <div id="savedSitesList"></div>
        <button class="config-add-btn" id="addSiteBtn">+ Add a site</button>
        <div id="addSiteForm" class="hidden">
          <form class="config-form" id="siteForm">
            <input id="fieldSiteUrl" type="text" placeholder="Site URL (e.g. remaphq.com)" required />
            <input id="fieldOwner" type="text" placeholder="GitHub owner (username or org)" required />
            <input id="fieldRepo" type="text" placeholder="Repo name" required />
            <input id="fieldBranch" type="text" placeholder="Branch (default: main)" />
            <input id="fieldToken" type="password" placeholder="Personal access token" required />
            <p class="config-form-hint">
              Need a token?
              <a href="https://github.com/settings/tokens/new?scopes=repo&description=Blip" target="_blank">
                Generate one on GitHub
              </a>
              with <code>repo</code> scope.
            </p>
            <div class="config-form-actions">
              <button type="submit" class="config-btn-save">Save site</button>
              <button type="button" class="config-btn-cancel" id="cancelAddSite">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Dev panel -->
    <div class="dev-panel collapsed" id="devPanel">
      <div class="dev-header">
        <span class="dev-label">Dev</span>
        <button class="dev-toggle" id="devToggle" title="Collapse/expand">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,4 6,8 10,4" />
          </svg>
        </button>
      </div>
      <div class="dev-body">
        <div class="dev-log" id="devLog"></div>
      </div>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>

</html>
